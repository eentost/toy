<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .game-over h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 24px;
            margin: 10px 0;
        }

        .game-over button {
            padding: 15px 30px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .game-over button:hover {
            background: #764ba2;
        }

        .game-over.show {
            display: flex;
        }

        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .instructions h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .instructions p {
            font-size: 18px;
            margin: 10px 0;
        }

        .instructions button {
            padding: 15px 30px;
            font-size: 18px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 200px;
            margin: 0 auto;
        }

        .instructions button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="info">
            Score: <span id="score">0</span>
        </div>
        <div class="instructions">
            <h1>🐦 Flappy Bird</h1>
            <p>Click or Press Space to Flap!</p>
            <p>Avoid the pipes and survive!</p>
            <button onclick="startGame()">Start Game</button>
        </div>
        <div class="game-over">
            <h1>Game Over!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Best Score: <span id="bestScore">0</span></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gameRunning = false;
        let gameOver = false;
        let score = 0;
        let bestScore = localStorage.getItem('flappyBestScore') || 0;

        // Bird object
        const bird = {
            x: 60,
            y: 300,
            width: 30,
            height: 24,
            gravity: 0.6,
            velocity: 0,
            jump: -12
        };

        // Pipes
        const pipes = [];
        const pipeWidth = 60;
        const pipeGap = 120;
        const pipeSpacing = 200;

        // Particle system for effects
        const particles = [];

        // Draw bird
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
            ctx.rotate(bird.velocity * 0.05);
            ctx.translate(-(bird.width / 2), -(bird.height / 2));
            
            // Bird body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(bird.width / 2, bird.height / 2, bird.width / 2, bird.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Bird eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.width / 2 + 5, bird.height / 2 - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // Draw pipes
        function drawPipes() {
            ctx.fillStyle = '#2ecc71';
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, canvas.height - pipe.topHeight - pipeGap);
            });
        }

        // Create new pipe
        function createPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - 50;
            const topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
            
            pipes.push({
                x: canvas.width,
                topHeight: topHeight,
                scored: false
            });
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            // Apply gravity
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            // Boundary collision
            if (bird.y <= 0 || bird.y + bird.height >= canvas.height) {
                endGame();
                return;
            }

            // Update pipes
            pipes.forEach((pipe, index) => {
                pipe.x -= 5;

                // Remove off-screen pipes
                if (pipe.x + pipeWidth < 0) {
                    pipes.splice(index, 1);
                }

                // Scoring
                if (!pipe.scored && pipe.x + pipeWidth < bird.x) {
                    pipe.scored = true;
                    score++;
                    createParticles(bird.x, bird.y, '#FFD700');
                }

                // Collision detection
                if (bird.x < pipe.x + pipeWidth && bird.x + bird.width > pipe.x) {
                    if (bird.y < pipe.topHeight || bird.y + bird.height > pipe.topHeight + pipeGap) {
                        endGame();
                        return;
                    }
                }
            });

            // Create new pipes
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - pipeSpacing) {
                createPipe();
            }

            updateParticles();
        }

        // Particle system
        function createParticles(x, y, color) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1,
                    color: color
                });
            }
        }

        function updateParticles() {
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.globalAlpha = 1;
            });
        }

        // Draw function
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw gradient sky
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw ground
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

            if (gameRunning) {
                drawPipes();
                drawBird();
                drawParticles();
            }
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        function flap() {
            if (!gameRunning) return;
            bird.velocity = bird.jump;
            createParticles(bird.x, bird.y, '#FF69B4');
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('click', flap);

        // Game control functions
        function startGame() {
            document.querySelector('.instructions').style.display = 'none';
            gameRunning = true;
            gameOver = false;
            score = 0;
            bird.y = 300;
            bird.velocity = 0;
            pipes.length = 0;
            particles.length = 0;
            document.getElementById('score').textContent = '0';
            createPipe();
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyBestScore', bestScore);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('bestScore').textContent = bestScore;
            document.querySelector('.game-over').classList.add('show');
        }

        function restartGame() {
            document.querySelector('.game-over').classList.remove('show');
            startGame();
        }

        // Initialize
        document.getElementById('bestScore').textContent = bestScore;
        gameLoop();
    </script>
</body>
</html>
