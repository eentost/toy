<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game - Simple & Fun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #776e65;
            margin-bottom: 20px;
            font-size: 50px;
        }
        .score-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .score-box {
            background: #bbada0;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
        }
        .score-box .label { font-size: 13px; font-weight: bold; }
        .score-box .value { font-size: 25px; font-weight: bold; margin-top: 5px; }
        .game-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .cell {
            background: #cdc1b4;
            border-radius: 5px;
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            color: #776e65;
        }
        .cell[data-value="2"] { background: #eee4da; }
        .cell[data-value="4"] { background: #ede0c8; }
        .cell[data-value="8"] { background: #f2b179; color: #f9f6f2; }
        .cell[data-value="16"] { background: #f59563; color: #f9f6f2; }
        .cell[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
        .cell[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
        .cell[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .cell[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .cell[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 25px; }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 12px 25px;
            background: #8f7a66;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #9f8a76; transform: scale(1.05); }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 10px;
        }
        .game-over.show { display: flex; }
        .game-over h2 { font-size: 50px; color: #776e65; margin-bottom: 20px; }
        .instructions {
            text-align: center;
            margin-top: 15px;
            color: #776e65;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <div class="label">SCORE</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">BEST</div>
                <div class="value" id="best">0</div>
            </div>
        </div>
        <div class="game-container">
            <div class="grid" id="grid"></div>
            <div class="game-over" id="gameOver">
                <h2>Game Over!</h2>
                <button onclick="game.restart()">Try Again</button>
            </div>
        </div>
        <div class="controls">
            <button onclick="game.restart()">New Game</button>
        </div>
        <div class="instructions">
            Use arrow keys ←↑→↓ or WASD to move tiles<br>
            Combine same numbers to reach 2048!
        </div>
    </div>
    <script>
        const game = {
            grid: [],
            score: 0,
            best: localStorage.getItem('2048-best') || 0,
            
            init() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.updateDisplay();
                this.addNewTile();
                this.addNewTile();
                this.render();
                this.setupControls();
            },
            
            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd'].includes(e.key)) {
                        e.preventDefault();
                        let moved = false;
                        switch(e.key) {
                            case 'ArrowLeft': case 'a': moved = this.move('left'); break;
                            case 'ArrowRight': case 'd': moved = this.move('right'); break;
                            case 'ArrowUp': case 'w': moved = this.move('up'); break;
                            case 'ArrowDown': case 's': moved = this.move('down'); break;
                        }
                        if (moved) {
                            this.addNewTile();
                            this.render();
                            if (!this.canMove()) this.gameOver();
                        }
                    }
                });
            },
            
            addNewTile() {
                const empty = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) empty.push({i, j});
                    }
                }
                if (empty.length > 0) {
                    const {i, j} = empty[Math.floor(Math.random() * empty.length)];
                    this.grid[i][j] = Math.random() < 0.9 ? 2 : 4;
                }
            },
            
            move(direction) {
                const oldGrid = JSON.stringify(this.grid);
                if (direction === 'left') this.grid = this.grid.map(row => this.mergeLine(row));
                if (direction === 'right') this.grid = this.grid.map(row => this.mergeLine(row.reverse()).reverse());
                if (direction === 'up') {
                    this.grid = this.transpose(this.grid);
                    this.grid = this.grid.map(row => this.mergeLine(row));
                    this.grid = this.transpose(this.grid);
                }
                if (direction === 'down') {
                    this.grid = this.transpose(this.grid);
                    this.grid = this.grid.map(row => this.mergeLine(row.reverse()).reverse());
                    this.grid = this.transpose(this.grid);
                }
                return oldGrid !== JSON.stringify(this.grid);
            },
            
            mergeLine(line) {
                let newLine = line.filter(x => x !== 0);
                for (let i = 0; i < newLine.length - 1; i++) {
                    if (newLine[i] === newLine[i + 1]) {
                        newLine[i] *= 2;
                        this.score += newLine[i];
                        newLine.splice(i + 1, 1);
                    }
                }
                while (newLine.length < 4) newLine.push(0);
                this.updateDisplay();
                return newLine;
            },
            
            transpose(matrix) {
                return matrix[0].map((_, i) => matrix.map(row => row[i]));
            },
            
            canMove() {
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) return true;
                        if (j < 3 && this.grid[i][j] === this.grid[i][j + 1]) return true;
                        if (i < 3 && this.grid[i][j] === this.grid[i + 1][j]) return true;
                    }
                }
                return false;
            },
            
            render() {
                const gridEl = document.getElementById('grid');
                gridEl.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        const value = this.grid[i][j];
                        if (value > 0) {
                            cell.textContent = value;
                            cell.dataset.value = value;
                        }
                        gridEl.appendChild(cell);
                    }
                }
            },
            
            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                if (this.score > this.best) {
                    this.best = this.score;
                    localStorage.setItem('2048-best', this.best);
                }
                document.getElementById('best').textContent = this.best;
            },
            
            gameOver() {
                document.getElementById('gameOver').classList.add('show');
            },
            
            restart() {
                document.getElementById('gameOver').classList.remove('show');
                this.init();
            }
        };
        
        game.init();
    </script>
</body>
</html>
